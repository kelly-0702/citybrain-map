<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CITYBRAIN - 智慧紅綠燈導航</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Leaflet 資源 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        .glass-card { background: rgba(16, 19, 26, 0.95); backdrop-filter: blur(32px); border: 1px solid rgba(255, 255, 255, 0.08); }
        #map { height: 440px; width: 100%; border-radius: 36px; z-index: 1; background: #0b0e14; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 地圖濾鏡 */
        .leaflet-tile-pane { filter: brightness(0.6) invert(0.9) contrast(1.2) hue-rotate(180deg) saturate(0.4); opacity: 0.9; }
        .leaflet-container { background: #0b0e14 !important; }
        
        /* 路線專用層 */
        .leaflet-route-pane { filter: none !important; z-index: 650 !important; }
        
        .route-segment { stroke-linecap: round; stroke-linejoin: round; transition: all 0.5s; }
        .route-green { filter: drop-shadow(0 0 8px #01f5a0); stroke-dasharray: 10, 15; animation: flow 20s linear infinite; }
        .route-orange { filter: drop-shadow(0 0 8px #ff9800); }
        .route-red { filter: drop-shadow(0 0 12px #ff4444); stroke-width: 10 !important; }
        
        @keyframes flow { to { stroke-dashoffset: -500; } }

        html, body { height: 100dvh; overflow: hidden; background: #0b0e14; margin: 0; }
        main { height: calc(100dvh - 170px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        nav { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
        .speed-glow { box-shadow: 0 0 20px rgba(1, 245, 160, 0.3); }
    </style>
</head>
<body class="text-[#e1e2eb] font-sans">

    <div class="mx-auto w-full max-w-md h-full flex flex-col relative bg-[#0b0e14]">
        
        <!-- Top App Bar -->
        <header class="flex-none glass-card px-5 py-4 flex justify-between items-center z-[2000] border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-[#5d5fef] flex items-center justify-center text-white shadow-lg">
                    <span class="material-symbols-outlined">bolt</span>
                </div>
                <h1 class="text-xl font-bold tracking-tighter text-[#c1c1ff]">CITYBRAIN</h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="gps-dot" class="w-2.5 h-2.5 rounded-full bg-[#01f5a0] animate-pulse"></div>
                <span id="header-user" class="text-[10px] text-[#01f5a0] font-black uppercase tracking-widest">連線中</span>
            </div>
        </header>

        <main class="flex-grow px-5 pt-4">
            <!-- 1. 首頁 -->
            <section id="home" class="tab-content active space-y-6">
                <div class="py-4">
                    <h2 class="text-3xl font-bold" id="welcome-name">早安</h2>
                    <p class="text-[#c1c1ff] font-medium">智慧綠波系統已同步</p>
                </div>
                <div class="glass-card rounded-2xl p-4 flex items-center gap-3 ring-1 ring-white/10">
                    <span class="material-symbols-outlined text-[#908fa0]">search</span>
                    <input id="dest-input" type="text" placeholder="目的地搜尋" class="bg-transparent border-none focus:ring-0 text-white w-full p-0">
                    <button onclick="startSearch()" class="bg-[#5d5fef] p-2 rounded-lg text-white"><span class="material-symbols-outlined">arrow_forward</span></button>
                </div>
                <div id="home-fav-grid" class="grid grid-cols-2 gap-4 pb-10"></div>
                <div id="guest-home-msg" class="text-center py-10 opacity-30 text-xs">登入後顯示常用地點</div>
            </section>

            <!-- 2. 導航 (更新轉彎指引) -->
            <section id="nav" class="tab-content space-y-4">
                <div class="relative">
                    <div id="map" class="glass-card overflow-hidden shadow-2xl"></div>
                    <div class="absolute top-4 inset-x-4 z-[1000]">
                        <div class="glass-card bg-[#1d2026]/95 border-l-4 border-[#01f5a0] p-4 rounded-2xl flex items-center gap-4 shadow-xl">
                            <span id="turn-icon" class="material-symbols-outlined text-3xl text-[#01f5a0]">navigation</span>
                            <div class="flex-1 overflow-hidden">
                                <p id="next-step-dist" class="text-[11px] text-[#01f5a0] font-black uppercase tracking-widest">路徑規劃中</p>
                                <p id="next-step-road" class="font-bold truncate text-white text-lg">準備出發</p>
                            </div>
                        </div>
                    </div>
                    <div class="absolute bottom-6 right-6 z-[1000] w-14 h-14 rounded-full glass-card border border-[#01f5a0] flex flex-col items-center justify-center speed-glow">
                        <span id="current-speed" class="text-lg font-black text-[#01f5a0]">0</span>
                        <span class="text-[7px] font-bold opacity-60">km/h</span>
                    </div>
                </div>
                <div class="glass-card rounded-[36px] p-6 border-l-4 border-[#5d5fef]">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-[#908fa0] font-black uppercase">預計抵達</span>
                            <span id="eta-time" class="text-xl font-bold text-white tracking-wide">--:--</span>
                        </div>
                        <div class="text-right">
                            <span id="timer" class="text-2xl font-bold text-[#01f5a0]">--s</span>
                            <p id="light-status" class="text-[8px] font-bold text-[#01f5a0] uppercase">綠波同步</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="space-y-1">
                            <div class="flex items-baseline gap-2">
                                <p class="text-5xl font-black text-white" id="time-display">--</p>
                                <span class="text-sm font-bold text-[#908fa0]">MIN</span>
                            </div>
                            <p id="dist-display" class="text-xs font-bold text-[#01f5a0]">GPS 連線中...</p>
                        </div>
                        <button onclick="saveCurrentDest()" id="save-dest-btn" class="hidden p-4 bg-white/5 rounded-2xl text-[10px] font-black border border-white/5">儲存地點</button>
                    </div>
                </div>
            </section>

            <!-- 3. 洞察 (保持無資料顯示) -->
            <section id="insights" class="tab-content space-y-6">
                <div class="py-4"><h2 class="text-3xl font-bold text-white">智慧洞察</h2></div>
                <div class="glass-card p-10 rounded-[40px] flex flex-col items-center text-center space-y-2 border-b-4 border-[#01f5a0]">
                    <p class="text-[#908fa0] text-sm font-black uppercase tracking-widest">累計為您省下</p>
                    <div class="flex items-baseline gap-2">
                        <span id="total-saved-min" class="text-7xl font-black text-[#908fa0]">無資料</span>
                        <span id="total-saved-unit" class="text-xl font-bold text-white"></span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 rounded-3xl text-center"><p class="text-xs text-[#908fa0] mb-1">減碳總量</p><p id="total-co2" class="text-xl font-bold">無資料</p></div>
                    <div class="glass-card p-6 rounded-3xl text-center"><p class="text-xs text-[#908fa0] mb-1">同步效率</p><p class="text-xl font-bold text-[#c1c1ff]">92%</p></div>
                </div>
            </section>

            <!-- 4. 個人 -->
            <section id="profile" class="tab-content space-y-6 pt-4 pb-20">
                <div class="flex items-center gap-5 p-6 glass-card rounded-[32px]">
                    <div id="user-avatar" class="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold text-white shadow-lg">?</div>
                    <div class="text-left">
                        <h3 id="user-name-display" class="text-xl font-bold">訪客</h3>
                        <p id="user-status-text" class="text-xs text-[#908fa0]">登入開啟完整導航功能</p>
                    </div>
                </div>
                <div id="fav-manager" class="hidden glass-card p-6 rounded-[32px] space-y-4">
                    <h4 class="font-bold text-[#c1c1ff] flex items-center gap-2 text-sm"><span class="material-symbols-outlined">add_location_alt</span> 管理常用地點</h4>
                    <div class="flex gap-2">
                        <input id="manual-place" type="text" placeholder="名稱" class="bg-white/5 border-none focus:ring-1 ring-[#c1c1ff] rounded-xl text-white w-full text-sm">
                        <button onclick="addManualPlace()" class="px-5 py-2 bg-[#01f5a0] text-black rounded-xl font-bold text-sm shrink-0">儲存</button>
                    </div>
                    <div id="fav-list" class="space-y-2 pt-2"></div>
                </div>
                <button onclick="toggleLoginState()" id="login-btn" class="w-full p-5 glass-card rounded-2xl flex items-center justify-center font-bold text-[#01f5a0]">登入系統</button>
            </section>
        </main>

        <!-- Navbar -->
        <nav class="flex-none glass-card px-4 pt-4 flex justify-around border-t border-white/10 z-[3000]">
            <button onclick="switchTab('home')" class="nav-item flex flex-col items-center gap-1 text-[#c1c1ff]" data-target="home"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span><span class="text-[10px] font-bold">首頁</span></button>
            <button onclick="switchTab('nav')" class="nav-item flex flex-col items-center gap-1 text-[#908fa0]" data-target="nav"><span class="material-symbols-outlined">assistant_navigation</span><span class="text-[10px] font-bold">導航</span></button>
            <button onclick="switchTab('insights')" class="nav-item flex flex-col items-center gap-1 text-[#908fa0]" data-target="insights"><span class="material-symbols-outlined">monitoring</span><span class="text-[10px] font-bold">洞察</span></button>
            <button onclick="switchTab('profile')" class="nav-item flex flex-col items-center gap-1 text-[#908fa0]" data-target="profile"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-bold">個人</span></button>
        </nav>
    </div>

    <script>
        let map, routingControl, userMarker, userLat, userLon;
        let routeSegments = [];
        let savedPlaces = JSON.parse(localStorage.getItem('cb_places')) || [];
        let totalSavedMin = parseInt(localStorage.getItem('cb_saved_time')) || 0;
        let isLoggedIn = localStorage.getItem('is_logged_in') === 'true';

        // --- 1. 紅綠燈同步時鐘 ---
        function updateTrafficLights() {
            const now = Math.floor(Date.now() / 1000);
            const phase = now % 60;
            const tEl = document.getElementById('timer'), sEl = document.getElementById('light-status');
            if (phase < 35) {
                tEl.innerText = (35 - phase) + 's'; tEl.className = "text-2xl font-bold text-[#01f5a0]";
                sEl.innerText = "綠波通行中"; sEl.className = "text-[8px] font-bold text-[#01f5a0] uppercase";
            } else {
                tEl.innerText = (60 - phase) + 's'; tEl.className = "text-2xl font-bold text-red-500";
                sEl.innerText = "紅燈停等"; sEl.className = "text-[8px] font-bold text-red-500 uppercase";
            }
        }
        setInterval(updateTrafficLights, 1000);

        // --- 2. GPS 監控 ---
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    userLat = p.coords.latitude; userLon = p.coords.longitude;
                    const speed = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
                    document.getElementById('current-speed').innerText = speed;
                    document.getElementById('gps-dot').className = "w-2.5 h-2.5 rounded-full bg-[#01f5a0] animate-pulse";
                    if (!map) {
                        map = L.map('map', { zoomControl: false }).setView([userLat, userLon], 16);
                        map.createPane('routePane').style.zIndex = 650;
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        userMarker = L.circleMarker([userLat, userLon], { radius: 10, color: '#fff', fillColor: '#5d5fef', fillOpacity: 1, weight: 4 }).addTo(map);
                    } else {
                        userMarker.setLatLng([userLat, userLon]);
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        // --- 3. 語音系統 ---
        function aiSpeak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-TW'; u.rate = 1.0; window.speechSynthesis.speak(u);
            }
        }

        // --- 4. 翻譯與指令合成 (加入紅綠燈邏輯) ---
        function translateAction(t, dist) {
            let res = t.replace(/Turn left/gi, "左轉").replace(/Turn right/gi, "右轉").replace(/Head/gi, "出發").replace(/onto/gi, "進入").replace(/Go straight/gi, "直行").replace(/Destination/gi, "抵達").replace(/to stay on/gi, "持續行駛");
            
            // 如果指令包含「左轉」或「右轉」，則合成為「幾百公尺後的紅綠燈左/右轉」
            if (res.includes("左轉") || res.includes("右轉")) {
                return `${dist}後的紅綠燈${res}`;
            }
            return `${dist}後${res}`;
        }

        async function startSearch() {
            const d = document.getElementById('dest-input').value;
            if (!d) return;
            aiSpeak("正在規劃路線。");
            switchTab('nav');
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(d + " 台灣")}&limit=1`);
                const data = await r.json();
                if (data && data.length > 0) planRoute(data[0].lat, data[0].lon, d);
            } catch (e) { alert("連線失敗"); }
        }

        function clearRouteSegments() { routeSegments.forEach(s => map.removeLayer(s)); routeSegments = []; }

        function planRoute(dLat, dLon, name) {
            if (routingControl) map.removeControl(routingControl);
            clearRouteSegments();

            routingControl = L.Routing.control({
                waypoints: [L.latLng(userLat, userLon), L.latLng(dLat, dLon)],
                lineOptions: { styles: [{ opacity: 0 }], pane: 'routePane' },
                addWaypoints: false, draggableWaypoints: false, createMarker: () => null
            }).addTo(map);

            routingControl.on('routesfound', (e) => {
                const r = e.routes[0];
                const fullPolyline = r.coordinates;
                const segmentSize = Math.floor(fullPolyline.length / 3);
                
                // 畫出路況三色線
                const gP = L.polyline(fullPolyline.slice(0, segmentSize + 1), { color: '#01f5a0', weight: 8, opacity: 0.9, className: 'route-segment route-green', pane: 'routePane' }).addTo(map);
                const oP = L.polyline(fullPolyline.slice(segmentSize, segmentSize * 2 + 1), { color: '#ff9800', weight: 8, opacity: 0.9, className: 'route-segment route-orange', pane: 'routePane' }).addTo(map);
                const rP = L.polyline(fullPolyline.slice(segmentSize * 2), { color: '#ff4444', weight: 8, opacity: 0.9, className: 'route-segment route-red', pane: 'routePane' }).addTo(map);
                routeSegments.push(gP, oP, rP);

                const d = (r.summary.totalDistance / 1000).toFixed(1);
                const m = Math.round((r.summary.totalTime / 60) * 1.7);
                if (isLoggedIn) { totalSavedMin += Math.round(m * 0.15); localStorage.setItem('cb_saved_time', totalSavedMin); renderInsights(); }
                
                document.getElementById('dist-display').innerText = `${d} km • 綠波同步啟動`;
                document.getElementById('time-display').innerText = m;
                const now = new Date(); now.setMinutes(now.getMinutes() + m);
                document.getElementById('eta-time').innerText = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });

                // 解析下一步指引 (幾百公尺後的紅綠燈轉彎)
                if (r.instructions && r.instructions.length > 1) {
                    const s = r.instructions[1];
                    const distT = s.distance >= 1000 ? (s.distance/1000).toFixed(1) + '公里' : Math.round(s.distance) + '公尺';
                    
                    // 合成帶有「紅綠燈」的顯示文字與語音
                    const combinedInstruction = translateAction(s.text, distT);
                    
                    document.getElementById('next-step-dist').innerText = "即將轉向";
                    document.getElementById('next-step-road').innerText = combinedInstruction;
                    
                    // 語音播報
                    aiSpeak(`規劃完成，全程約 ${d} 公里。請注意， ${combinedInstruction}。`);

                    const iconEl = document.getElementById('turn-icon');
                    if(s.text.includes('Turn left')) iconEl.innerText = 'turn_left';
                    else if(s.text.includes('Turn right')) iconEl.innerText = 'turn_right';
                    else iconEl.innerText = 'straight';
                }
                map.fitBounds(r.bounds, { padding: [100, 100] });
            });
        }

        // --- 5. UI 與 狀態管理 ---
        function updateUserUI() {
            const h = document.getElementById('header-user'), w = document.getElementById('welcome-name'), l = document.getElementById('login-btn'), a = document.getElementById('user-avatar'), n = document.getElementById('user-name-display'), s = document.getElementById('user-status-text'), fm = document.getElementById('fav-manager'), sd = document.getElementById('save-dest-btn'), gm = document.getElementById('guest-home-msg');
            if (isLoggedIn) {
                h.innerText = "宇翔"; w.innerText = "早安，宇翔"; n.innerText = "宇翔 (Sean)"; s.innerText = "系統已連線"; l.innerText = "登出系統"; l.className = "w-full p-5 glass-card rounded-2xl text-red-400 font-bold"; a.innerText = "宇"; a.className = "w-16 h-16 rounded-full bg-[#5d5fef] flex items-center justify-center text-white text-2xl font-bold"; fm.classList.remove('hidden'); sd.classList.remove('hidden'); gm.classList.add('hidden'); renderFavorites(); renderInsights();
            } else {
                h.innerText = "訪客模式"; w.innerText = "早安，訪客"; n.innerText = "尚未登入"; s.innerText = "登入以開啟完整功能"; l.innerText = "立即登入"; l.className = "w-full p-5 glass-card rounded-2xl text-[#01f5a0] font-bold"; a.innerText = "?"; a.className = "w-16 h-16 rounded-full bg-white/5 flex items-center justify-center text-[#908fa0] text-2xl font-bold"; fm.classList.add('hidden'); sd.classList.add('hidden'); gm.classList.remove('hidden'); document.getElementById('home-fav-grid').innerHTML = ""; renderInsights();
            }
        }
        function toggleLoginState() { isLoggedIn = !isLoggedIn; localStorage.setItem('is_logged_in', isLoggedIn); updateUserUI(); }
        function renderInsights() {
            const d = document.getElementById('total-saved-min'), c = document.getElementById('total-co2'), u = document.getElementById('total-saved-unit');
            if (isLoggedIn) { d.innerText = totalSavedMin; d.className = "text-7xl font-black text-[#01f5a0]"; u.innerText = "MIN"; c.innerText = (totalSavedMin * 0.05).toFixed(1) + " kg"; c.className = "text-xl font-bold text-[#01f5a0]"; } else { d.innerText = "無資料"; d.className = "text-5xl font-black text-[#908fa0]"; u.innerText = ""; c.innerText = "無資料"; c.className = "text-xl font-bold text-[#908fa0]"; }
        }
        function renderFavorites() {
            if (!isLoggedIn) return; const list = document.getElementById('fav-list'), grid = document.getElementById('home-fav-grid'); list.innerHTML = ""; grid.innerHTML = "";
            savedPlaces.forEach(p => {
                list.innerHTML += `<div class="glass-card p-4 rounded-xl flex justify-between items-center text-sm"><span class="font-bold">${p}</span><div class="flex gap-2"><button onclick="quickSearch('${p}')" class="bg-[#01f5a0] text-black text-[10px] px-3 py-1 rounded-lg font-bold">導航</button><button onclick="removePlace('${p}')" class="text-red-400 text-xs px-2">刪除</button></div></div>`;
                grid.innerHTML += `<button onclick="quickSearch('${p}')" class="glass-card p-5 rounded-[32px] text-left aspect-square flex flex-col justify-between active:scale-95 transition-all"><span class="material-symbols-outlined text-[#01f5a0] text-4xl">push_pin</span><h3 class="font-bold text-lg">${p}</h3></button>`;
            });
        }
        function addManualPlace() { const n = document.getElementById('manual-place').value; if (n && !savedPlaces.includes(n)) { savedPlaces.push(n); localStorage.setItem('cb_places', JSON.stringify(savedPlaces)); renderFavorites(); document.getElementById('manual-place').value = ""; } }
        function removePlace(n) { savedPlaces = savedPlaces.filter(p => p !== n); localStorage.setItem('cb_places', JSON.stringify(savedPlaces)); renderFavorites(); }
        function saveCurrentDest() { const c = document.getElementById('dest-input').value; if (c && !savedPlaces.includes(c)) { savedPlaces.push(c); localStorage.setItem('cb_places', JSON.stringify(savedPlaces)); renderFavorites(); aiSpeak("地點已收藏"); } }
        function quickSearch(n) { document.getElementById('dest-input').value = n; aiSpeak("準備前往" + n); performSearch(n); }
        async function performSearch(dest) { switchTab('nav'); try { const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dest + " 台灣")}&limit=1`); const d = await r.json(); if (d && d.length > 0) planRoute(d[0].lat, d[0].lon, dest); } catch (e) { alert("連線失敗"); } }
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if (t === 'nav' && map) setTimeout(() => map.invalidateSize(), 300);
            document.querySelectorAll('.nav-item').forEach(i => {
                const act = i.dataset.target === t;
                i.classList.toggle('text-[#c1c1ff]', act); i.classList.toggle('text-[#908fa0]', !act);
                i.querySelector('.material-symbols-outlined').style.fontVariationSettings = act ? "'FILL' 1" : "'FILL' 0";
            });
        }
        function openGoogleMaps() { const d = document.getElementById('dest-input').value || "目的地"; window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(d)}&travelmode=driving`, '_blank'); }

        window.onload = () => { updateUserUI(); initGPS(); };
        document.getElementById('dest-input').addEventListener('keypress', e => e.key === 'Enter' && startSearch());
    </script>
</body>
</html>
